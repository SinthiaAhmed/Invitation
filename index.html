<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nikkah Invitation – Sinthia & Akhlak</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; min-height:100dvh;
  background: radial-gradient(ellipse at 40% 30%, #1a2e1a 0%, #0d1f0d 55%, #060f06 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Cinzel', serif;
  overflow-x:hidden;
  touch-action:manipulation;
}
@keyframes fall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:0; }
  10%  { opacity:0.55; }
  90%  { opacity:0.2; }
  100% { transform:translateY(110vh) rotate(380deg); opacity:0; }
}
.petal { position:fixed; border-radius:50% 0 50% 0; pointer-events:none; animation:fall linear infinite; opacity:0; will-change:transform; }
@keyframes blink { 0%,100%{opacity:.25} 50%{opacity:.85} }
#hint {
  position:fixed; bottom:max(20px, env(safe-area-inset-bottom, 20px));
  left:50%; transform:translateX(-50%);
  color:rgba(180,210,130,.6); font-size:11px; letter-spacing:4px;
  text-transform:uppercase; white-space:nowrap;
  animation:blink 2s ease-in-out infinite; transition:opacity .4s;
}
#env-wrap {
  position:relative; width:min(280px,80vw); height:min(364px,104vw);
  cursor:pointer; user-select:none;
  transition:opacity .35s ease, transform .35s ease;
}
#env-wrap:active { transform:scale(.97); }
#env-wrap.gone { opacity:0; transform:scale(.82); pointer-events:none; }
.env-bg {
  position:absolute; inset:0; border-radius:16px;
  background:linear-gradient(150deg,#6a9a4a 0%,#3d6b28 45%,#254518 100%);
  box-shadow:0 24px 70px rgba(0,0,0,.75),0 0 0 1.5px rgba(210,185,80,.4);
}
.env-bg::before {
  content:''; position:absolute; inset:10px;
  border:1px solid rgba(210,185,80,.32); border-radius:9px; pointer-events:none;
}
.env-bg::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:55%;
  border-radius:0 0 16px 16px;
  background: linear-gradient(135deg,transparent 49.5%,rgba(0,0,0,.13) 50%) left/50% 100% no-repeat,
              linear-gradient(225deg,transparent 49.5%,rgba(0,0,0,.13) 50%) right/50% 100% no-repeat;
  pointer-events:none;
}
.env-flap {
  position:absolute; top:0; left:0; right:0; height:48%;
  clip-path:polygon(0 0,100% 0,50% 100%);
  background:linear-gradient(175deg,#82b85a 0%,#4d7a30 55%,#2e5018 100%);
  border-radius:16px 16px 0 0;
}
.env-flap::after {
  content:''; position:absolute; inset:0;
  clip-path:polygon(2% 0,98% 0,50% 97%);
  border:1px solid rgba(210,185,80,.3); pointer-events:none;
}
@keyframes glow {
  0%,100% { box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 0 3px rgba(185,160,42,.4),0 0 8px rgba(220,200,60,.15); }
  50%     { box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 0 3px rgba(185,160,42,.85),0 0 28px rgba(220,200,60,.5); }
}
.seal {
  position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
  width:60px; height:60px; border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#ffe97a,#c9a82a 60%,#7a5a0a 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:rgba(50,30,0,.75);
  animation:glow 2.5s ease-in-out infinite; z-index:5;
  font-style:italic; font-weight:bold;
}
.env-label { position:absolute; bottom:22px; left:50%; transform:translateX(-50%); text-align:center; white-space:nowrap; }
.env-label .l1 { font-size:12px; letter-spacing:2px; color:rgba(220,240,180,.85); display:block; margin-bottom:3px; }
.env-label .l2 { font-size:8.5px; letter-spacing:2.5px; color:rgba(200,230,150,.5); display:block; }
#card-wrap {
  display:none; position:relative; width:min(380px,94vw);
  animation:popIn .6s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes popIn {
  from { opacity:0; transform:scale(.82) translateY(28px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
#card-wrap img {
  width:100%; display:block; border-radius:18px;
  box-shadow:0 32px 90px rgba(0,0,0,.8),0 0 0 1.5px rgba(185,160,42,.45);
}
#rsvp-trigger {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; margin-top:16px; padding:15px 0; border-radius:50px;
  background:linear-gradient(135deg,#5a7a3a 0%,#3a5228 100%);
  border:none; cursor:pointer;
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  letter-spacing:2px; color:#fff; text-transform:uppercase;
  box-shadow:0 6px 24px rgba(58,82,40,.55);
  transition:transform .15s, box-shadow .15s; touch-action:manipulation;
}
#rsvp-trigger:hover { box-shadow:0 8px 30px rgba(58,82,40,.7); transform:translateY(-1px); }
#rsvp-trigger:active { transform:scale(.97); }
#close-btn {
  display:flex; margin:14px auto 0;
  width:48px; height:48px; border-radius:50%;
  background:rgba(255,255,255,.07); border:1px solid rgba(185,160,42,.3);
  cursor:pointer; align-items:center; justify-content:center;
  font-size:18px; color:rgba(200,230,160,.7);
  touch-action:manipulation; transition:transform .15s;
}
#close-btn:active { transform:scale(.93); }
#rsvp-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(4,12,4,.88); backdrop-filter:blur(6px);
  align-items:flex-end; justify-content:center;
}
#rsvp-overlay.active { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#rsvp-sheet {
  width:min(480px,100vw);
  background:linear-gradient(170deg,#0f1f0f 0%,#081208 100%);
  border-radius:24px 24px 0 0;
  padding:24px 22px max(36px,env(safe-area-inset-bottom,36px));
  border-top:1.5px solid rgba(185,160,42,.4);
  animation:slideUp .35s cubic-bezier(.22,1,.36,1);
  max-height:92dvh; overflow-y:auto;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle {
  width:40px; height:4px; border-radius:2px;
  background:rgba(255,255,255,.18); margin:0 auto 18px;
}
.sheet-title { text-align:center; font-size:17px; letter-spacing:3px; color:#c9b97a; margin-bottom:4px; }
.sheet-sub {
  text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:13px; color:rgba(180,210,130,.5); margin-bottom:22px; letter-spacing:1px;
}
.attend-toggle {
  display:flex; width:100%; border-radius:50px; overflow:hidden;
  border:1px solid rgba(185,160,42,.35); margin-bottom:20px;
}
.attend-btn {
  flex:1; padding:.8rem .5rem; background:transparent; border:none;
  cursor:pointer; font-size:12px; font-family:'Cinzel',serif;
  color:rgba(180,210,130,.5); letter-spacing:1px;
  transition:all .2s; touch-action:manipulation;
}
.attend-btn.active { background:linear-gradient(135deg,#5a7a3a,#3a5228); color:#fff; }
.field { margin-bottom:16px; }
.field label {
  display:block; font-size:9px; letter-spacing:3px;
  text-transform:uppercase; color:rgba(185,160,42,.7); margin-bottom:7px;
}
.field input {
  width:100%; padding:13px 15px; border-radius:10px;
  background:rgba(255,255,255,.05); border:1px solid rgba(185,160,42,.25);
  color:rgba(220,240,180,.9); font-family:'Cinzel',serif; font-size:13px;
  outline:none; transition:border-color .2s; -webkit-appearance:none;
}
.field input:focus { border-color:rgba(185,160,42,.7); background:rgba(255,255,255,.07); }
.field input::placeholder { color:rgba(180,210,130,.25); }
.guest-counter {
  display:flex; align-items:center; border-radius:10px; overflow:hidden;
  border:1px solid rgba(185,160,42,.25); background:rgba(255,255,255,.05);
}
.counter-btn {
  width:52px; height:50px; background:transparent; border:none;
  cursor:pointer; font-size:22px; color:#c9b97a;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s; touch-action:manipulation; font-family:'Cinzel',serif;
}
.counter-btn:active { background:rgba(185,160,42,.15); }
.counter-display {
  flex:1; text-align:center; font-size:20px;
  color:rgba(220,240,180,.9); font-family:'Cinzel',serif;
  border-left:1px solid rgba(185,160,42,.2);
  border-right:1px solid rgba(185,160,42,.2); padding:.6rem;
}
.field textarea {
  width:100%; padding:13px 15px; border-radius:10px;
  background:rgba(255,255,255,.05); border:1px solid rgba(185,160,42,.25);
  color:rgba(220,240,180,.9); font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:15px; outline:none; resize:none; min-height:110px;
  transition:border-color .2s; -webkit-appearance:none;
}
.field textarea:focus { border-color:rgba(185,160,42,.7); background:rgba(255,255,255,.07); }
.field textarea::placeholder { color:rgba(180,210,130,.25); }
.blessing-note {
  text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:14px; color:rgba(180,210,130,.5); line-height:1.7; margin-bottom:18px; padding:0 4px;
}
#send-rsvp {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; margin-top:6px; padding:15px 0; border-radius:50px;
  background:linear-gradient(135deg,#5a7a3a 0%,#3a5228 100%);
  border:none; cursor:pointer;
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  letter-spacing:2px; color:#fff; text-transform:uppercase;
  box-shadow:0 6px 24px rgba(58,82,40,.5);
  transition:transform .15s; touch-action:manipulation;
}
#send-rsvp:active { transform:scale(.97); }
#send-rsvp:disabled { opacity:.6; cursor:not-allowed; }
#rsvp-cancel {
  display:block; margin:14px auto 0; background:none; border:none;
  font-family:'Cormorant Garamond',serif; font-style:italic; font-size:14px;
  color:rgba(180,210,130,.4); cursor:pointer; letter-spacing:1px; touch-action:manipulation;
}
#thanks-screen {
  display:none; flex-direction:column; align-items:center;
  text-align:center; gap:1.25rem; padding:2rem 1.5rem;
}
#thanks-screen.active { display:flex; animation:popIn .5s cubic-bezier(.22,1,.36,1) forwards; }
.thanks-ornament { color:#c9b97a; font-size:20px; letter-spacing:8px; }
.thanks-icon { font-size:52px; line-height:1; }
.thanks-title { font-size:22px; color:#a8c87a; letter-spacing:3px; }
.thanks-msg {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:16px; color:rgba(180,210,130,.6); line-height:1.8; max-width:280px;
}
.thanks-back {
  margin-top:8px; background:none; border:none; cursor:pointer;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:14px; color:rgba(185,160,42,.5); text-decoration:underline; touch-action:manipulation;
}
.spinner {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
  border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle;
}
@keyframes spin { to{transform:rotate(360deg)} }
.hidden { display:none !important; }

#music-note {
  position: fixed; top: 16px; right: 16px;
  font-size: 18px; opacity: 0.55;
  z-index: 50; pointer-events: none;
  animation: blink 2s ease-in-out infinite;
}
</style>
</head>
<body>

  <audio id="bg-music" src="Rovalio - Shuru Karein (Official Audio) - Rovalio (128k).mp3" loop preload="auto"></audio>
<div id="music-note">♪</div>

<div id="env-wrap" onclick="openCard()">
  <div class="env-bg"></div>
  <div class="env-flap"></div>
  <div class="seal"></div>
  <div class="env-label">
    <span class="l2">tap to open your invitation</span>
  </div>
</div>

<div id="card-wrap">
  <img src="Card.png" alt="invitation card">
  <button id="rsvp-trigger" onclick="openRSVP()">✦ &nbsp; Kindly Reply &nbsp; ✦</button>
  <button id="close-btn" onclick="closeCard()">✕</button>
</div>

<div id="thanks-screen">
  <div class="thanks-ornament">✦ ✦ ✦</div>
  <div class="thanks-icon" id="thanks-icon">🥂</div>
  <div class="thanks-title" id="thanks-title">THANK YOU</div>
  <p class="thanks-msg" id="thanks-msg"></p>
  <div class="thanks-ornament">✦ ✦ ✦</div>
  <button class="thanks-back" onclick="backToCard()">← Back to invitation</button>
</div>

<div id="hint">tap to open</div>

<!-- Hidden iframe to absorb Google Form redirect without navigating away -->
<iframe name="hidden-form-target" style="display:none"></iframe>

<div id="rsvp-overlay" onclick="overlayClick(event)">
  <div id="rsvp-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">RSVP</div>
    <div class="sheet-sub">Sinthia &amp; Akhlak · July 16, 2026</div>

    <div class="attend-toggle">
      <button class="attend-btn active" id="btn-yes" onclick="setAttending(true)">✓ &nbsp; Joyfully Accepts</button>
      <button class="attend-btn" id="btn-no" onclick="setAttending(false)">✗ &nbsp; Regretfully Declines</button>
    </div>

    <div id="form-attending">
      <div class="field">
        <label>Your Full Name *</label>
        <input type="text" id="att-name" placeholder="Enter your name" autocomplete="name" />
      </div>
      <div class="field">
        <label>Number of Guests</label>
        <div class="guest-counter">
          <button class="counter-btn" onclick="changeGuests(-1)">−</button>
          <div class="counter-display" id="guest-count">1</div>
          <button class="counter-btn" onclick="changeGuests(1)">+</button>
        </div>
      </div>
    </div>

    <div id="form-declining" class="hidden">
      <p class="blessing-note">We will miss you on this blessed occasion.<br>Please leave a message for the couple.</p>
      <div class="field">
        <label>Your Full Name *</label>
        <input type="text" id="dec-name" placeholder="Enter your name" autocomplete="name" />
      </div>
      <div class="field">
        <label>Your Blessing or Du'a</label>
        <textarea id="dec-blessing" placeholder="Write your heartfelt wishes…"></textarea>
      </div>
    </div>

    <!-- Hidden form that submits silently to Google Forms via iframe -->
    <form id="gform" action="https://docs.google.com/forms/d/e/1FAIpQLSc53fxLUZIHI_lddRneKXS3hvN3q4KLv13fZEjxLiRv_RIsdA/formResponse" method="POST" target="hidden-form-target" style="display:none">
      <input type="hidden" name="entry.624780994"  id="f-name" />
      <input type="hidden" name="entry.1986767484" id="f-guests" />
      <input type="hidden" name="entry.1092284346" id="f-attending" />
      <input type="hidden" name="entry.2001961709" id="f-blessing" />
    </form>

    <button id="send-rsvp" onclick="submitRSVP()">Confirm Attendance</button>
    <button id="rsvp-cancel" onclick="closeRSVP()">Cancel</button>
  </div>
</div>

<script>
  var attending = true;
  var guestCount = 1;

  var pc = ['#a8c47a','#c9b97a','#88b058','#d4c880'];
  for (var i = 0; i < 16; i++) {
    var p = document.createElement('div'); p.className = 'petal';
    var s = 7 + Math.random() * 11;
    p.style.cssText = 'left:' + (Math.random()*100) + '%;top:-20px;width:' + s + 'px;height:' + (s*1.35) + 'px;background:' + pc[i%4] + ';animation-duration:' + (7+Math.random()*9) + 's;animation-delay:' + (Math.random()*10) + 's;';
    document.body.appendChild(p);
  }

  function openCard() {
    document.getElementById('bg-music').play().catch(function(){});
    document.getElementById('env-wrap').classList.add('gone');
    setTimeout(function() {
      document.getElementById('env-wrap').style.display = 'none';
      document.getElementById('card-wrap').style.display = 'block';
      document.getElementById('hint').style.display = 'none';
      spawnParticles();
    }, 370);
  }

  function closeCard() {
    document.getElementById('card-wrap').style.display = 'none';
    document.getElementById('thanks-screen').classList.remove('active');
    var env = document.getElementById('env-wrap');
    env.style.display = 'block';
    env.classList.remove('gone');
    document.getElementById('hint').style.display = 'block';
  }

  function openRSVP() { document.getElementById('rsvp-overlay').classList.add('active'); }
  function closeRSVP() { document.getElementById('rsvp-overlay').classList.remove('active'); }
  function overlayClick(e) { if (e.target === document.getElementById('rsvp-overlay')) closeRSVP(); }

  function setAttending(val) {
    attending = val;
    document.getElementById('btn-yes').classList.toggle('active', val);
    document.getElementById('btn-no').classList.toggle('active', !val);
    document.getElementById('form-attending').classList.toggle('hidden', !val);
    document.getElementById('form-declining').classList.toggle('hidden', val);
    document.getElementById('send-rsvp').textContent = val ? 'Confirm Attendance' : 'Send My Blessing';
  }

  function changeGuests(d) {
    guestCount = Math.max(1, Math.min(10, guestCount + d));
    document.getElementById('guest-count').textContent = guestCount;
  }

  function submitRSVP() {
    var btn = document.getElementById('send-rsvp');
    var name = attending
      ? document.getElementById('att-name').value.trim()
      : document.getElementById('dec-name').value.trim();

    if (!name) {
      var inp = attending ? document.getElementById('att-name') : document.getElementById('dec-name');
      inp.style.borderColor = 'rgba(255,100,80,.7)';
      inp.focus();
      setTimeout(function() { inp.style.borderColor = ''; }, 2000);
      return;
    }

    // Populate hidden Google Form fields
    document.getElementById('f-name').value     = name;
    document.getElementById('f-guests').value   = attending ? guestCount : 0;
    document.getElementById('f-attending').value = attending ? 'Yes' : 'No';
    document.getElementById('f-blessing').value  = attending ? '' : (document.getElementById('dec-blessing').value || '');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    // Submit silently into hidden iframe — no CORS, no page navigation
    document.getElementById('gform').submit();

    // Small delay so form submit fires, then show thank you
    setTimeout(function() {
      closeRSVP();
      document.getElementById('card-wrap').style.display = 'none';

      if (attending) {
        document.getElementById('thanks-icon').textContent = '🥂';
        document.getElementById('thanks-title').textContent = 'Your presence means so much to us';
        document.getElementById('thanks-msg').textContent = 'Thank you, ' + name + '! We are so happy you\'ll be joining us. See you on July 16th! 🌿';
      } else {
        document.getElementById('thanks-icon').textContent = '💌';
        document.getElementById('thanks-title').textContent = 'Sorry you can’t make it';
        document.getElementById('thanks-msg').textContent = 'Dear ' + name + ', we are touched by your warm wishes. You will be in our hearts and prayers on this blessed day.';
      }
      document.getElementById('thanks-screen').classList.add('active');
      spawnParticles();
    }, 800);
  }

  function backToCard() {
    document.getElementById('thanks-screen').classList.remove('active');
    document.getElementById('card-wrap').style.display = 'block';
    attending = true; guestCount = 1;
    document.getElementById('att-name').value = '';
    document.getElementById('dec-name').value = '';
    document.getElementById('dec-blessing').value = '';
    document.getElementById('guest-count').textContent = '1';
    document.getElementById('btn-yes').classList.add('active');
    document.getElementById('btn-no').classList.remove('active');
    document.getElementById('form-attending').classList.remove('hidden');
    document.getElementById('form-declining').classList.add('hidden');
    document.getElementById('send-rsvp').textContent = 'Confirm Attendance';
    document.getElementById('send-rsvp').disabled = false;
  }

  function spawnParticles() {
    var cx = window.innerWidth/2, cy = window.innerHeight/2;
    for (var i = 0; i < 28; i++) {
      (function(i) {
        var p = document.createElement('div');
        var a = (i/28)*Math.PI*2, d = 60+Math.random()*100, s = 5+Math.random()*7;
        p.style.cssText = 'position:fixed;z-index:9999;border-radius:50%;pointer-events:none;left:'+cx+'px;top:'+cy+'px;width:'+s+'px;height:'+s+'px;background:'+(Math.random()>.45?'#c9b97a':'#a8c47a')+';transition:transform .6s cubic-bezier(.22,1,.36,1),opacity .7s ease;transform:translate(-50%,-50%);opacity:1;';
        document.body.appendChild(p);
        requestAnimationFrame(function() {
          p.style.transform = 'translate(calc(-50% + '+(Math.cos(a)*d)+'px),calc(-50% + '+(Math.sin(a)*d)+'px))';
          p.style.opacity = '0';
        });
        setTimeout(function() { if(p.parentNode) p.parentNode.removeChild(p); }, 1200);
      })(i);
    }
  }

  document.body.addEventListener('touchstart', function() {
  var audio = document.getElementById('bg-music');
  if (audio.paused) audio.play().catch(function(){});
}, { once: true });
</script>
</body>
</html>
